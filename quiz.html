<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Flags Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== NAVIGATION ===== -->
<header class="main-nav">
  <div class="nav-logo">🌍 Flag Explorer</div>
  <nav>
    <a href="index.html" data-page="index">Home</a>
    <a href="flags.html" data-page="flags">Index</a>
    <a href="quiz.html" data-page="quiz">Quiz</a>
    <a href="stats.html" data-page="stats">Stats</a>
  </nav>
</header>

<div class="page-wrapper">

  <h1 class="page-title">🎮 Flags Quiz</h1>

  <!-- ===== SETUP ===== -->
  <div class="quiz-setup">

    <select id="modeSelect">
      <option value="normal">Classic Mode</option>
      <option value="timed">Timer Mode (60s)</option>
    </select>

    <select id="difficultySelect">
      <option value="4">Easy (4 choices)</option>
      <option value="6">Medium (6 choices)</option>
      <option value="8">Hard (8 choices)</option>
    </select>

    <select id="typeSelect">
      <option value="all">All Types</option>
    </select>

    <button id="startBtn">Start !</button>

  </div>

  <!-- ===== QUIZ CARD ===== -->
  <div id="quiz-container" class="quiz-card" style="display:none;">

    <div class="quiz-stats">
      <div>🎯 Score : <span id="score">0</span></div>
      <div>🔥 Streak : <span id="streak">0</span></div>
      <div>⏱ Time : <span id="timer">--</span></div>
      <div>🏆 Best : <span id="bestScore">0</span></div>
    </div>

    <div class="quiz-image-box">
      <img id="quiz-flag" src="" alt="Drapeau">
    </div>

    <div id="answers" class="answers-grid"></div>

    <div class="quiz-collection">
      📚 Collection : <span id="collectionProgress">0</span>
    </div>

  </div>

</div>

<script src="quiz.js"></script>

<script>
  const links = document.querySelectorAll(".main-nav a");
  const currentPage = window.location.pathname.split("/").pop().replace(".html","");
  links.forEach(link => {
    if (link.dataset.page === currentPage) {
      link.classList.add("active");
    }
  });
</script>

</body>
</html>
