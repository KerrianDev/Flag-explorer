<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Flag index</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-nav">
  <div class="nav-logo">🌍 Flag Explorer</div>
  <nav>
    <a href="index.html" data-page="index">Home</a>
    <a href="flags.html" data-page="flags">Index</a>
    <a href="quiz.html" data-page="quiz">Quiz</a>
    <a href="stats.html" data-page="stats">Stats</a>
  </nav>
</header>

<div class="page-wrapper">

  <h1 class="page-title">📚 Flag Index</h1>

  <div class="section-card filters-bar">
      <input type="text" placeholder="Rechercher un drapeau..." id="search">
      <select id="continentFilter">
        <option value="all">All Continents</option>
      </select>
      <select id="filter">
        <option value="all">All Types</option>
      </select>
      <select id="countryFilter">
        <option value="all">All Countries</option>
      </select>
      <select id="sortOrder">
        <option value="az">Name (A-Z)</option>
        <option value="za">Name (Z-A)</option>
      </select>
  </div>

  <div id="results-info" class="results-info"></div>
  <div id="flags-container"></div>
  <div id="pagination"></div>

</div>

<script src="flags.js"></script>

<script>
  const links = document.querySelectorAll(".main-nav a");
  const currentPage = window.location.pathname.split("/").pop().replace(".html","");
  links.forEach(link => {
    if (link.dataset.page === currentPage) {
      link.classList.add("active");
    }
  });
</script>

</body>
</html>
